     same container classes, same `label.cursor-pointer` value elements, and the
     nested outer/inner <label> pattern used for phone numbers. -->
<div class="reveal-form">
  <div class="prospect-info">
    <div>
      <div class="flex flex-row items-center mb-2">
        <p class="text-sm text-neutral-600"> Emails</p>
      </div>
      <div class="space-y-2">
        <button type="button" class="button-component">
          <span>
            <div class="flex flex-row items-center justify-between cursor-pointer">
              <label class="font-medium text-xs font-medium cursor-pointer">jesse@leonardleadership.com</label>
            </div>
          </span>
        </button>
        <button type="button" class="button-component">

            </div>

      </div>
    </div>
    <div>
